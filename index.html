<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #111;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<model-viewer 
  src="pamyatnyk_1.glb"

  camera-controls
  auto-rotate
  rotation-per-second="10deg"

  exposure="1.1"
  tone-mapping="aces"

  shadow-intensity="1.5"
  shadow-softness="0.5"

  camera-orbit="25deg 40deg 140%"
  
  field-of-view="60deg"

  interaction-prompt="none">

</model-viewer>

</body>
</html>
